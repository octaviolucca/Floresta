version: 2

updates:
    - package-ecosystem: "cargo"
      directory: "/"
      schedule:
          interval: "weekly"
          time: "00:00"
      cooldown:
          default-days: 60
      groups:
          all:
            patterns: ["*"]

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          time: "00:00"
      cooldown:
          default-days: 60
      groups:
          all:
            patterns: ["*"]

    - package-ecosystem: "nix"
      directory: "/"
      schedule:
          interval: "weekly"
          time: "00:00"
      cooldown:
          default-days: 60
      groups:
          all:
            patterns: ["*"]

    - package-ecosystem: "uv"
      directory: "/"
      schedule:
          interval: "weekly"
          time: "00:00"
      cooldown:
          default-days: 60
      groups:
          all:
            patterns: ["*"]
